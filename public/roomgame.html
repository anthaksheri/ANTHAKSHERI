<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Word Chain Game</title>
    <link rel="stylesheet" href="game.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
    <div class="player-names">
        <h3>Players</h3>
        <div id="players-list">
        </div>
    </div>

    <div class="game-container">
        <header>
            <h1 id="game-title">Word Chain</h1>
            <div id="game-mode-display" style="font-size: 16px; font-weight: bold; color: #ffc107; margin-bottom: 10px;">
            </div>
            <p>The word is: <span id="required-letter">INITIATE...</span></p>
        </header>
        
        <div id="round-display" style="font-size:18px; font-weight:bold;">Waiting for players...</div> 

        <div class="timer" id="timer">⏳ SYNCING</div>

        <div class="input-area">
            <input type="text" id="player-input" placeholder="Enter a word..." autocomplete="off" disabled />
            <button onclick="submitWord()">Submit</button>
        </div>

        <button class="back-btn" onclick="window.location.href='index.html'">Back</button>

        <div class="error" id="error-msg"></div>
    </div>

    <div class="history">
        <h2>Word History</h2>
        <ul id="wordList">
        </ul>
    </div>

    <div id="countdown-overlay" class="overlay hidden">
        <div id="countdown-text" class="countdown-text">3</div>
    </div>

    <div id="gameover-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="gameover-message">Game Over</h2>
            <button onclick="window.location.href='index.html'">Back to Menu</button>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>

    <script src="roomgame.js"></script>
</body>
</html>
